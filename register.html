<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <link rel="icon" type="logo/png" href="logo.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="register-section">
    <h1>Event Registration</h1>
    <p>Please fill in the form below.</p>

    <form class="register-form" action="success.html" method="GET">

<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email Address" required>
<input type="tel" placeholder="Phone Number" required>

        <select required>
            <option value="">Select Event</option>
            <option>Stress Management Workshop</option>
            <option>Mental Health Awareness Seminar</option>
            <option>Mindfulness Meditation Session</option>
        </select>

        <button type="submit">Submit Registration</button>

    </form>
</section>

</body>
</html>
